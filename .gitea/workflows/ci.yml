name: CI

on:
  push:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: [popstation, host]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure
